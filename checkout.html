<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock Checkout | CakeBuilder Demo</title>
    <meta name="description" content="Review mock CakeBuilder Demo cart items and request a test order." />
    <link rel="stylesheet" href="styles.css?v=20260608-checkout" />
  </head>
  <body data-page="checkout">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="CakeBuilder Demo home">
        <span class="brand-mark">CB</span>
        <span class="brand-text">CakeBuilder Demo</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="index.html#about">About Us</a>
        <a href="builder.html">Cake Designer</a>
      </nav>
      <div class="header-actions">
        <div class="desktop-actions" aria-label="Account and checkout">
          <a class="icon-button bag-button" href="checkout.html" aria-label="Open checkout" aria-current="page">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M6.5 8.5h11l1 11h-13l1-11Z" />
              <path d="M9 8.5a3 3 0 0 1 6 0" />
            </svg>
            <span class="cart-count">0</span>
          </a>
          <details class="account-menu">
            <summary class="icon-button" aria-label="Open account menu">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
                <path d="M4.5 20a7.5 7.5 0 0 1 15 0" />
              </svg>
            </summary>
            <div class="account-popover">
              <a href="profile.html">Profile</a>
            </div>
          </details>
        </div>
        <details class="mobile-menu">
          <summary class="hamburger-button" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
          </summary>
          <nav class="mobile-menu-panel" aria-label="Mobile navigation">
            <a href="index.html">Home</a>
            <a href="index.html#about">About Us</a>
            <a href="builder.html">Cake Designer</a>
            <a aria-current="page" href="checkout.html">Checkout <span class="cart-count menu-count">0</span></a>
            <a href="profile.html">Profile</a>
          </nav>
        </details>
      </div>
    </header>

    <main class="checkout-flow-page">
      <section class="checkout-flow-shell" aria-labelledby="checkoutTitle">
        <div class="checkout-flow-heading">
          <p class="eyebrow">Mock checkout</p>
          <h1 id="checkoutTitle">Complete your cake request.</h1>
          <p>
            A guided demo checkout for reviewing contact details, delivery timing, cake selections,
            and a simulated payment result.
          </p>
        </div>

        <nav class="checkout-stepper-wrap" aria-label="Checkout progress">
          <ol class="checkout-stepper" id="checkoutStepper"></ol>
        </nav>

        <details class="checkout-mobile-summary">
          <summary>
            <span>Order summary</span>
            <strong id="mobileSummaryTotal">$0</strong>
          </summary>
          <div id="orderSummaryMobile"></div>
        </details>

        <section class="checkout-flow-grid">
          <section class="checkout-step-card" id="checkoutStepContent" aria-live="polite"></section>
          <aside class="checkout-order-summary" aria-label="Order summary">
            <div id="orderSummaryDesktop"></div>
          </aside>
        </section>
      </section>
    </main>

    <script src="config.js?v=20260609-config"></script>
    <script src="app.js?v=20260609-config"></script>
  </body>
</html>
